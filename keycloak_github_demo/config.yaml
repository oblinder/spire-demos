# Keycloak RBAC Demo Configuration - GitHub Demo
# NOTE: Keycloak connection settings and realm name are in .env file
# NOTE: Access control policy (user role to client role mappings) is in access_control_policy.yaml

# Client configurations with roles
# Each client can have multiple roles, each role gets its own audience scope
clients:
  - client_id: "demo-ui"
    roles:
      - "demo-ui"
  - client_id: "github-agent"
    roles:
      - "github-agent"
  - client_id: "github-tool"
    roles:
      - "github-partial-access"
      - "github-full-access"

# Realm roles (can be composites of client roles)
realm_roles:
  - developer
  - tech-support
  - sales

# Client audience targets (which target clients each client needs audience scopes for)
# For each target client, ALL role-specific scopes will be assigned
# e.g., if github-tool has roles [github-partial-access, github-full-access],
# both github-partial-access-audience and github-full-access-audience scopes will be assigned
client_audience_targets:
  demo-ui:
    - github-agent
  github-agent:
    - github-tool
  github-tool: []

# User configurations (only username and roles needed, rest uses defaults)
users:
  - username: "alice"
    roles:
      - "developer"

  - username: "bob"
    roles:
      - "tech-support"

  - username: "charlie"
    roles:
      - "sales"

